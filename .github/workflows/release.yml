name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Compute release version
        id: release_version
        run: |
          BASE_VERSION=$(node -p "require('./packages/vscode/package.json').version.split('.').slice(0,2).join('.')")
          RELEASE_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp package versions
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const version = process.env.RELEASE_VERSION;
          const files = [
            'package.json',
            'packages/sdk/package.json',
            'packages/core/package.json',
            'packages/mcp/package.json',
            'packages/vscode/package.json',
          ];
          const dependencySections = [
            'dependencies',
            'devDependencies',
            'peerDependencies',
            'optionalDependencies',
          ];

          for (const file of files) {
            const filePath = path.join(process.cwd(), file);
            const pkg = JSON.parse(fs.readFileSync(filePath, 'utf8'));

            if (file === 'package.json' || pkg.name?.startsWith('@officernd/') || pkg.name === 'officernd-mcp-vscode') {
              pkg.version = version;
            }

            for (const section of dependencySections) {
              const deps = pkg[section];
              if (!deps) {
                continue;
              }

              for (const name of Object.keys(deps)) {
                if (name.startsWith('@officernd/')) {
                  deps[name] = version;
                }
              }
            }

            fs.writeFileSync(filePath, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          NODE

      - name: Pack MCP server
        run: |
          mkdir -p artifacts
          cd packages/mcp
          npm pack --pack-destination ../../artifacts/
          cd ../sdk
          npm pack --pack-destination ../../artifacts/
          cd ../core
          npm pack --pack-destination ../../artifacts/
        working-directory: ${{ github.workspace }}

      - name: Pack VS Code extension
        run: |
          npm install -g @vscode/vsce
          echo "Packaging VS Code extension version: ${{ steps.release_version.outputs.version }}"
          cd packages/vscode
          vsce package --no-dependencies --out ../../artifacts/
        working-directory: ${{ github.workspace }}

      - name: Publish VS Code extension to Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: |
          cd packages/vscode
          vsce publish --no-dependencies --pat "$VSCE_PAT"
        working-directory: ${{ github.workspace }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.tag }}
          name: Release ${{ steps.release_version.outputs.tag }}
          body: |
            ## OfficeRnD MCP Server ${{ steps.release_version.outputs.tag }}

            ### Packages
            - `@officernd/sdk` — OfficeRnD REST API SDK
            - `@officernd/core` — Business logic helpers
            - `@officernd/mcp` — MCP server (130+ tools)
            - `officernd-mcp-vscode` — VS Code extension

            ### Installation
            ```bash
            npm install -g @officernd/mcp
            ```

            ### Quick Start
            ```bash
            export OFFICERND_CLIENT_ID=your_client_id
            export OFFICERND_CLIENT_SECRET=your_client_secret
            export OFFICERND_ORG=your_org_slug
            officernd-mcp
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full documentation.
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
